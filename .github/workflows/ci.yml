# APEX Middleware CI Pipeline
# Runs on every push and pull request to main.
# Validates: format, lint, build, test, security audit.

name: APEX CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Format Check
  # Enforces consistent formatting across the entire workspace.
  # -----------------------------------------------------------------------
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # -----------------------------------------------------------------------
  # Job 2: Clippy Lint
  # Enforces Rust best practices and catches common mistakes.
  # We treat warnings as errors on CI.
  # -----------------------------------------------------------------------
  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # -----------------------------------------------------------------------
  # Job 3: Build
  # Verifies the workspace compiles cleanly in both dev and release.
  # -----------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [dev, release]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (${{ matrix.profile }})
        run: |
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo build --release --all
          else
            cargo build --all
          fi

  # -----------------------------------------------------------------------
  # Job 4: Test
  # Runs the full test suite with output on failure.
  # -----------------------------------------------------------------------
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [fmt, clippy, build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit tests
        run: cargo test --all -- --nocapture
      - name: Run doc tests
        run: cargo test --doc --all

  # -----------------------------------------------------------------------
  # Job 5: Security Audit
  # Scans dependencies for known vulnerabilities.
  # Never ship a runtime with known CVEs.
  # -----------------------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run security audit
        run: cargo audit

  # -----------------------------------------------------------------------
  # Job 6: Cross-compile ARM64
  # Validates that the runtime compiles for embedded/robot targets.
  # -----------------------------------------------------------------------
  cross-arm64:
    name: Cross-compile ARM64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-linker
        run: sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Cross-compile
        run: cargo build --target aarch64-unknown-linux-gnu --all
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
